<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Simple Template</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background-color: #f4f4f4;
        }

        header {
            background-color: #333;
            color: white;
            padding: 15px;
            text-align: center;
        }

        nav {
            background-color: #555;
            padding: 10px;
            text-align: center;
        }

        nav a {
            color: white;
            margin: 0 10px;
            text-decoration: none;
        }

        nav a:hover {
            text-decoration: underline;
        }

        .container {
            display: flex;
            padding: 20px;
        }

        .sidebar {
            width: 25%;
            background: #ddd;
            padding: 15px;
        }

        .content {
            width: 75%;
            background: white;
            padding: 15px;
            margin-left: 10px;
        }

        footer {
            background-color: #333;
            color: white;
            text-align: center;
            padding: 10px;
            margin-top: 10px;
        }
    </style>
</head>

<body>

    <header>
        <h1>My Website</h1>
        <p>Simple HTML CSS Template</p>
    </header>

    <nav>
        <a href="#">Home</a>
        <a href="#">About</a>
        <a href="#">Services</a>
        <a href="#">Contact</a>
    </nav>

    <div class="container">
        <div class="sidebar">
            <h3>Sidebar</h3>
            <p>Some links or information here.</p>
        </div>

        <div class="content">
            <h2>Main Content</h2>
            <p>This is a simple layout using HTML and CSS.</p>
            <p>You can customize this template easily.</p>
        </div>
    </div>

    <footer>
        <p>© 2026 My Website</p>
    </footer>

</body>

</html>
